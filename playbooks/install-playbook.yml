---
- hosts: localhost
  become: yes
  become_method: sudo
  tasks:
   - name: Install things
     pacman:
       name:
          # My dev env
          - neovim
          - fzf
          - fd
          - entr
          - jq
          - openssh
          - fish
          - tmux
          - viewnior
          - ctags
          - imagemagick
          - bat
          - eza
          - ripgrep
          - uv
          - emacs
          - npm
          - just
          - tk
          - entr
          - pyright

          # OS
          - base
          - time
          - keychain
          - alacritty
          - pkgconf
          - tlp
          - tp_smapi
          - x86_energy_perf_policy
          - ttf-liberation
          - ttf-dejavu
          - ttf-cascadia-code-nerd
          - acpi
          - iwd
          - acpi_call-dkms
          - wireplumber
          - yt-dlp
          - htop
          - lsof
          - zip
          - 7zip
          - unzip
          - unrar
          - vlc
          - openbox
          - redshift
          - less

          # Intel specific
          - intel-ucode
          - xf86-video-intel

          # Extra
          - cmatrix
          - firefox
          - powertop
          - udisks2
          - ranger
          - stow
          - ufw

          # For connecting with android
          - mtpfs
          - gvfs-mtp

          # For ranger
          - highlight
          - w3m

          # For samba share
          - gvfs-smb
       state: present
       update_cache: true
